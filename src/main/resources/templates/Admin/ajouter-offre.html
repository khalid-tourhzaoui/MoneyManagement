<!DOCTYPE html>
<html lang="en">
<head th:replace="Admin/head :: head" >


<body>

    <!--*******************
        Preloader start
    ********************-->
    <div id="preloader">
        <div class="sk-three-bounce">
            <div class="sk-child sk-bounce1"></div>
            <div class="sk-child sk-bounce2"></div>
            <div class="sk-child sk-bounce3"></div>
        </div>
    </div>
    <!--*******************
        Preloader end
    ********************-->


    <!--**********************************
        Main wrapper start
    ***********************************-->
    <div id="main-wrapper">
		<!--**********************************
            Nav header start
        ***********************************-->
        <div th:replace="Admin/NavHeader :: NavHeader"></div>

        <!--**********************************
            Nav header end
        ***********************************-->
	
		
		<!--**********************************
            Header start
        ***********************************-->
        <div th:replace="Admin/header :: header"></div>

        <!--**********************************
            Header end ti-comment-alt
        ***********************************-->

        <!--**********************************
            Sidebar start
        ***********************************-->
        <div th:replace="Admin/sidebar :: sidebar"></div>

        <!--**********************************
            Sidebar end
        ***********************************-->


       <!--**********************************
            Content body start
        ***********************************-->
        <div class="content-body">
			<div class="container-fluid">
				<!-- Add Project -->
				
                <div class="row page-titles mx-0">
                    <div class="col-sm-6 p-md-0">
                        <div class="welcome-text">
                            <h4>Hi, welcome back!</h4>
                            <p class="mb-0">Your business dashboard template</p>
                        </div>
                    </div>
                    <div class="col-sm-6 p-md-0 justify-content-sm-end mt-2 mt-sm-0 d-flex">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="javascript:void(0)">Home</a></li>
                            <li class="breadcrumb-item active"><a href="javascript:void(0)">Components</a></li>
                        </ol>
                    </div>
                </div>
                <!-- row -->
                <div class="row">
                    <div class="col-xl-12 col-xxl-12">
                        <div class="card">
                            <div class="card-header">
                                <h4 class="card-title">Form step</h4>
                            </div>
                            <div class="card-body">
								<div id="smartwizard" class="form-wizard order-create">
									<ul class="nav nav-wizard">
										<li><a class="nav-link"  href="#wizard_Service"> 
											<span>1</span> 
										</a></li>
										<li><a class="nav-link" href="#wizard_Time">
											<span>2</span>
										</a></li>
										<li><a class="nav-link" href="#wizard_Details">
											<span>3</span>
										</a></li>
										<li><a class="nav-link" href="#wizard_Payment">
											<span>4</span>
										</a></li>
									</ul>
									<form class="tab-content" th:action="@{/ajouter-offre}" method="post" th:object="${daretOperation}">
										<div  id="wizard_Service" class="tab-pane" role="tabpanel">
											<div class="row">
												<div class="col-lg-12 mb-2">
													<div class="form-group">
														<label for="designation">Nom d'opération :</label>
        												<input type="text" maxlength="30" id="designation"th:field="*{designation}" class="form-control" placeholder="Entrez le nom d'opération" required>
													</div>
												</div>
												<div class="col-lg-12 mb-2">
													<div class="form-group">
														<label for="single-select">Type de Période</label>
												        <select id="single-select" class="form-control" name="typePeriode" th:field="*{typePeriode}">
												            <option value="mensuelle">Mensuelle</option>
												            <option value="hebdomadaire">Hebdomadaire</option>
												            <option value="par_semaine">Par semaine</option>
												        </select>
													</div>
												</div>
											</div>
										</div>
										<div id="wizard_Time" class="tab-pane" role="tabpanel">
											<div class="row">
												
												<div class="col-lg-12 mb-2">
													<div class="form-group">
												        <label for="nombreParticipant">Nombre de Personne : </label>
												        <div class="input-group">
												            <button type="button" class="btn btn-outline-primary" onclick="decrement()">-</button>
												            <input type="number" class="form-control mx-1" id="nombreParticipant" name="nombreParticipant" th:field="*{nombreParticipant}" placeholder="Enter Nombre de Personne">
												            <button type="button" class="btn btn-outline-primary" onclick="increment()">+</button>
												        </div>
												    </div>
												</div>
												<div class="col-lg-12 mb-2">
													<div class="form-group">
												        <label for="montantParPeriode">Montant par Période :</label>
												        <div class="input-group">
												            <button type="button" class="btn btn-outline-primary" onclick="decrementMontant()">-</button>
												            <input type="number" class="form-control" id="montantParPeriode" name="montantParPeriode" th:field="*{montantParPeriode}" placeholder="Enter Montant par Période">
												            <button type="button" class="btn btn-outline-primary" onclick="incrementMontant()">+</button>
												        </div>
												    </div>
												</div>
											</div>
										</div>
										<div id="wizard_Details" class="tab-pane" role="tabpanel">
											<div class="row">
												<div class="col-lg-12 mb-2">
													<div class="form-group">
												        <label for="dateDebut">Date Début</label>
												        <input type="date" class="form-control" id="dateDebut" name="dateDebut" th:field="*{dateDebut}" required placeholder="Enter Date Début (YYYY-MM-DD)">
											    	</div>
												</div>
											</div>
											
											<div class="row">
												<div class="col-lg-12 mb-2">
													<div class="form-group">
												        <label for="dateFin">Date Fin</label>
												        <input type="date" class="form-control" id="dateFin" name="dateFin" th:field="*{dateFin}" required placeholder="Enter Date Fin (YYYY-MM-DD)">
												    </div>
												</div>
											</div>
										</div>
										
										<div id="wizard_Payment" class="tab-pane" role="tabpanel">
											<div class="row">
												<div class="col-lg-6 mx-auto mb-2">
													<div class="form-group">
												        <button type="submit" class="btn btn-success w-100">Ajouter</button>
												    </div>
												</div>
											</div>
											
										</div>
										
									</form>
								</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!--**********************************
            Content body end
        ***********************************-->


        <!--**********************************
            Footer start
        ***********************************-->
        <div class="footer">
            <div class="copyright">
                <p>Copyright © Designed &amp; Developed by <a href="../index.htm" target="_blank">DexignZone</a> 2021</p>
            </div>
        </div>
        <!--**********************************
            Footer end
        ***********************************-->

        <!--**********************************
           Support ticket button start
        ***********************************-->

        <!--**********************************
           Support ticket button end
        ***********************************-->

        
    </div>
    <!--**********************************
        Main wrapper end
    ***********************************-->

    <!--**********************************
        Scripts
    ***********************************-->
    <!-- Required vendors -->
    <script data-cfasync="false" src="../cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="vendor/global/global.min.js"></script>
	<script src="vendor/bootstrap-select/dist/js/bootstrap-select.min.js"></script>

    <script src="vendor/jquery-steps/build/jquery.steps.min.js"></script>
    <script src="vendor/jquery-validation/jquery.validate.min.js"></script>
    <!-- Form validate init -->
    <script src="js/plugins-init/jquery.validate-init.js"></script>
<script src="vendor/select2/js/select2.full.min.js"></script>
    <script src="js/plugins-init/select2-init.js"></script>
   <!-- Form Steps -->
	<script src="vendor/jquery-smartwizard/dist/js/jquery.smartWizard.js"></script>
	
    <script src="js/custom.min.js"></script>
	<script src="js/deznav-init.js"></script>
    <script src="js/demo.js"></script>
    <script>
    function increment() {
        var input = document.getElementById('nombreParticipant');
        input.stepUp();
    }

    function decrement() {
        var input = document.getElementById('nombreParticipant');
        input.stepDown();
    }
    function incrementMontant() {
        var input = document.getElementById('montantParPeriode');
        input.stepUp();
    }

    function decrementMontant() {
        var input = document.getElementById('montantParPeriode');
        input.stepDown();
    }
    var currentDate = new Date();

    // Set the day, month, and year buttons
    document.getElementById('dayButton').textContent = `${currentDate.toLocaleDateString('en-US', { weekday: 'long' })} ${currentDate.getDate()}`;
    document.getElementById('monthButton').textContent = currentDate.toLocaleString('default', { month: 'short' });
    document.getElementById('yearButton').textContent = currentDate.getFullYear();
</script>
</body>

</html>
