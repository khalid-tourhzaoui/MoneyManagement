<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=figtree:400,500,600&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{../css/index.css}">
</head>
<body>
<div class="container font-sans text-gray-900 antialiased">
	<form th:action="@{/registration}" method="post" role="form" th:object="${user}">
		<div class="container-fluid login-1">
			<div class="container">
				<div class="login-form">
					<div class="row align-items-center">
						<div class="col-md-5">
							<div class="img-box">
								<img th:src="@{images/school-software-removebg.png}" class="img img-fluid me-5 pe-5" title="login"alt="welcome image">
							</div>
						</div>
						<div class="col-md-7">
							<div class="row">
                        		<div style="border-radius: 1rem;" th:if="${error}" class=" alert alert-danger col-sm-10">
							    	<span  th:text="${error}"></span>
                         		</div>
                         	</div>
							<div class="row">
                        		<div class="col-md-6 form-group">
                         			<input style="border-radius: 1rem;" class="form-control block w-100  w-full" type="text" name="nom"th:field="*{nom}" required autofocus placeholder="Entrez votre nom" />
                         		</div>
                         		<div class="col-md-6 form-group">
                         			<input style="border-radius: 1rem;" class="form-control block w-100  w-full" type="text" name="prenom"th:field="*{prenom}" required autofocus placeholder="Entrez votre prenom" />
                         		</div>
                         	</div>
                         	<div class="row">
                        		<div class="col-md-6 form-group">
                         			<input style="border-radius: 1rem;" class="form-control block w-100  w-full" type="text" name="cin"th:field="*{cin}" required autofocus placeholder="Entrez votre cin" />
                         		</div>
                         		<div class="col-md-6 form-group">
                         			<input style="border-radius: 1rem;" class="form-control block w-100  w-full" type="email" name="cin"th:field="*{email}" required autofocus placeholder="Entrez votre email" />
                         		</div>
                         	</div>
                         	<div class="row">
                        		<div class="col-md-6 form-group">
                         			<input style="border-radius: 1rem;" class="form-control block w-100  w-full" type="password" name="password"th:field="*{password}" required autofocus placeholder="Enter your password" />
                         		</div>
                        		<div class="col-md-6 form-group">
                                    <input style="border-radius: 1rem;" class="form-control block w-100 w-full" type="password" name="confirmPassword" th:field="*{confirmPassword}" required placeholder="Confirm your password" />
                         		</div>
                         	</div> 
                         	<div class="row">
                        		<div class="col-md-12 form-group">
                         			<button class="btn btn-primary w-100" type="submit">Register</button>
                         		</div>
                         	</div>             
						</div>
						
					</div>
				</div>
			</div>
		</div>
	</form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
