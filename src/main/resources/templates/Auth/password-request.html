
<!--*****************************************************************************************************************************************-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta charset="utf-8">
  	<link rel="preconnect" href="https://fonts.bunny.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link href="https://fonts.bunny.net/css?family=figtree:400,500,600&display=swap" rel="stylesheet" />
    <link href="vendor/bootstrap-select/dist/css/bootstrap-select.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{../css/index.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
	
</head>
<body>
    <div class="container font-sans text-gray-900 antialiased">
        <form  method="post" role="form" th:action="@{/password-request}">
            <div class="container-fluid login-1">
                <div class="container">
                    <div class="login-form">
                        <div class="row align-items-center">
                            <div class="col-md-6">
                                <div class="img-box">
                                    <img th:src="@{/images/forget-password.png}" class="img img-fluid" title="login"
                                        alt="welcome image">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="login-box">
                                    <div class="row">
                                        <h4 class="login-title">Forgot Password</h4>
											<p class="login-p">No problem. Forgot your password? Simply enter your email address,
											    and we'll send you a password reset link that will allow you to choose a new one.</p>
                                    </div>
                                    
                                    <div class="form-group">
                                        <input id="email" class="form-control block mt-1 w-full" style="border-radius: 1rem;"
                                        	placeholder="Entrez votre email-adress" type="email" name="email" required />
                                        	
                                        <div th:if="${error != null}">
                                        	<div class="alert alert-danger bg-danger text-white solid alert-dismissible fade show">
												<svg viewbox="0 0 24 24" width="24 " height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"></polygon><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
												<strong>Error ! </strong> [[${error}]].
												<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
				                             </div>
                                    	</div>
	
		                                <div th:if="${param.success}">
										    <div class="alert alert-success bg-success text-white solid alert-dismissible fade show">
										        <svg viewbox="0 0 24 24" width="24" height="24" stroke="currentColor"  stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="mr-2 text-white">
										            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
										            <polygon points="22 4 12 14.01 9 11.01"></polygon>
										        </svg>
										        <strong>Success! </strong> Password reset link sent successfully. Please check your email.
										        <button type="button" class="btn btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
										    </div>
										</div>

                                    </div>
                                    <button class="btn btn-primary w-100">
                                        Email Password Reset Link
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>

</html>
